<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPU Studio | Mini Compiler</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">

<style>
:root {
    --bg-dark: #0a0c10;
    --bg-panel: #0f1117;
    --bg-panel2: #161b22;
    --border-subtle: #21262d;
    --accent: #58a6ff;
    --text-primary: #f0f3f8;
    --text-secondary: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --purple: #a371f7;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(12px);
    padding: 12px 24px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}

.logo {
    font-weight: 700;
    font-size: 1.1rem;
    background: linear-gradient(135deg, #e6edf3 0%, #58a6ff 100%);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo::before {
    content: "⚡";
    color: var(--accent);
}

.run-btn {
    background: linear-gradient(95deg, #ef4444 0%, #dc2626 100%);
    border: none;
    padding: 8px 24px;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 40px;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
}

.run-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
}

.main-content {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
}

.editor-section {
    flex: 65%;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    min-width: 0;
    overflow: hidden;
}

.editor-label {
    padding: 10px 16px;
    background: rgba(22, 27, 34, 0.8);
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    flex-shrink: 0;
}

.code-editor-wrapper {
    flex: 1;
    min-height: 0;
    overflow: hidden;
}

.CodeMirror {
    height: 100% !important;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-panel) !important;
}

.CodeMirror-gutters {
    background: #0c0f14 !important;
}

.terminal-section {
    flex-shrink: 0;
    height: 240px;
    background: #0a0c10;
    border-top: 2px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
}

.terminal-header {
    padding: 5px 16px;
    background: #0d1117;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.terminal-header::before {
    content: "❯";
    color: var(--green);
    font-weight: bold;
    font-size: 0.9rem;
}

.terminal-output {
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    overflow: auto;
    white-space: pre-wrap;
    flex: 1;
}

.sidebar-section {
    flex: 35%;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel2);
    min-width: 0;
    overflow: hidden;
}

.tabs {
    display: flex;
    background: #0d1117;
    border-bottom: 1px solid var(--border-subtle);
    padding: 0 8px;
    gap: 2px;
    flex-shrink: 0;
    flex-wrap: wrap;
}

.tab {
    padding: 10px 16px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text-secondary);
    transition: all 0.2s;
}

.tab:hover {
    color: var(--text-primary);
}

.tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

.panel-content {
    flex: 1;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 0;
}

.tree-node {
    margin-left: 0;
    list-style: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.8;
}

.tree-node li {
    list-style: none;
    position: relative;
    padding-left: 24px;
    margin: 0;
}

.tree-node li::before {
    content: "├── ";
    position: absolute;
    left: 0;
    color: var(--accent);
}

.tree-node li:last-child::before {
    content: "└── ";
}

.tree-node .node-type {
    color: #ffd966;
    font-weight: 600;
}

.tree-node .node-value {
    color: #7ee0ff;
}

.tree-node .node-key {
    color: var(--text-secondary);
}

.benchmark-panel {
    flex-shrink: 0;
    height: 240px;
    background: #0a0e17;
    margin: 0;
    border-top: 1px solid var(--border-subtle);
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.benchmark-header {
    padding: 8px 16px;
    background: #0d1117;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.benchmark-header::before {
    content: "📊";
}

.benchmark-stats {
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    overflow: auto;
    flex: 1;
}

.stat-card {
    background: #0f1117;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

.stat-label {
    color: var(--text-secondary);
    font-size: 10px;
    margin-bottom: 6px;
}

.stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
}

.stat-value.speedup {
    color: var(--purple);
}

.stat-sub {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 4px;
}

.success {
    color: var(--green);
}

.error {
    color: var(--red);
}

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #1a1f2a;
}
::-webkit-scrollbar-thumb {
    background: #3d444d;
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
}

@media (max-width: 768px) {
    .main-content {
        flex-direction: column;
    }
    .editor-section {
        flex: 50%;
    }
    .sidebar-section {
        flex: 50%;
    }
    .benchmark-stats {
        grid-template-columns: 1fr;
    }
    .terminal-section, .benchmark-panel {
        height: 200px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">FPU STUDIO</div>
    <button class="run-btn" onclick="runCode()">▶ RUN</button>
</div>

<div class="main-content">
    <div class="editor-section">
        <div class="editor-label">📝 CODE EDITOR</div>
        <div class="code-editor-wrapper">
            <textarea id="code">
i = 0
sum = 0.0
while (i < 1000) do
    sum = sum + 3.14159 * 2.71828
    i = i + 1
    end
print sum
            </textarea>
        </div>
        
        <div class="terminal-section">
            <div class="terminal-header">OUTPUT TERMINAL</div>
            <div class="terminal-output" id="output">—</div>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="tabs">
            <div class="tab active" data-tab="tokens">TOKENS</div>
            <div class="tab" data-tab="ast">AST</div>
            <div class="tab" data-tab="optimized_ast">OPT AST</div>
            <div class="tab" data-tab="ir">IR</div>
            <div class="tab" data-tab="instructions">ISA</div>
        </div>
        <div class="panel-content" id="panel">
            <span style="color:#6e7681;">— click RUN to compile —</span>
        </div>
        
        <div class="benchmark-panel" id="benchmarkPanel">
            <div class="benchmark-header">BENCHMARK RESULTS</div>
            <div class="benchmark-stats" id="benchmarkStats">
                <span style="color:#6e7681; grid-column: span 2; text-align: center;">— run code to see benchmark —</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>

<script>
const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
    theme: "dracula",
    lineNumbers: false,
    mode: "python",
    lineWrapping: true,
    indentUnit: 4,
    tabSize: 4
});

let compilerData = {};
let currentTab = "tokens";

document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", function() {
        currentTab = this.getAttribute("data-tab");
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        this.classList.add("active");
        updatePanel();
    });
});

function renderTree(node, isLast = true, prefix = "") {
    if (!node) return "";
    
    let result = "";
    const nodeType = node.type;
    const currentPrefix = prefix + (isLast ? "└── " : "├── ");
    
    result += `<div>${currentPrefix}<span class="node-type">${nodeType}</span>`;
    
    if (node.value !== undefined) {
        result += ` = <span class="node-value">${node.value}</span>`;
    }
    if (node.name !== undefined && nodeType === "Var") {
        result += ` (<span class="node-value">${node.name}</span>)`;
    }
    if (node.op !== undefined) {
        result += ` [<span class="node-value">${node.op}</span>]`;
    }
    result += `</div>`;
    
    const childrenKeys = [];
    if (node.statements) childrenKeys.push(["statements", node.statements]);
    if (node.body) childrenKeys.push(["body", node.body]);
    if (node.then) childrenKeys.push(["then", node.then]);
    if (node.else) childrenKeys.push(["else", node.else]);
    if (node.condition) childrenKeys.push(["condition", node.condition]);
    if (node.left) childrenKeys.push(["left", node.left]);
    if (node.right) childrenKeys.push(["right", node.right]);
    if (node.expr) childrenKeys.push(["expr", node.expr]);
    if (node.name && nodeType === "Assign") childrenKeys.push(["name", node.name]);
    if (node.value && nodeType === "Assign") childrenKeys.push(["value", node.value]);
    
    for (let i = 0; i < childrenKeys.length; i++) {
        const [key, val] = childrenKeys[i];
        const isLastChild = (i === childrenKeys.length - 1);
        const newPrefix = prefix + (isLast ? "    " : "│   ");
        
        result += `<div>${newPrefix}${isLastChild ? "└── " : "├── "}<span class="node-key">${key}</span></div>`;
        
        if (Array.isArray(val)) {
            for (let j = 0; j < val.length; j++) {
                const isLastItem = (j === val.length - 1);
                result += renderTree(val[j], isLastItem, newPrefix + "    ");
            }
        } else if (typeof val === "object") {
            result += renderTree(val, true, newPrefix + "    ");
        } else if (typeof val === "string" && (key === "name" || key === "op")) {
            result += `<div>${newPrefix}    ${isLastChild ? "└── " : "├── "}<span class="node-value">${val}</span></div>`;
        }
    }
    
    return result;
}

function updatePanel() {
    const panel = document.getElementById("panel");
    let content = "";
    
    if (currentTab === "tokens") {
        content = compilerData.tokens?.join("\n");
        if (content) {
            panel.innerHTML = `<pre style="margin:0;font-family:inherit;">${escapeHtml(content)}</pre>`;
        } else {
            panel.innerHTML = '<span style="color:#6e7686;">— no data —</span>';
        }
    } 
    else if (currentTab === "ast") {
        if (compilerData.ast_tree) {
            panel.innerHTML = `<div class="tree-node">${renderTree(compilerData.ast_tree)}</div>`;
        } else if (compilerData.ast) {
            panel.innerHTML = `<pre style="margin:0;font-family:inherit;">${escapeHtml(compilerData.ast)}</pre>`;
        } else {
            panel.innerHTML = '<span style="color:#6e7686;">— no data —</span>';
        }
    }
    else if (currentTab === "optimized_ast") {
        if (compilerData.optimized_ast_tree) {
            panel.innerHTML = `<div class="tree-node">${renderTree(compilerData.optimized_ast_tree)}</div>`;
        } else if (compilerData.optimized_ast) {
            panel.innerHTML = `<pre style="margin:0;font-family:inherit;">${escapeHtml(compilerData.optimized_ast)}</pre>`;
        } else {
            panel.innerHTML = '<span style="color:#6e7686;">— no data —</span>';
        }
    }
    else if (currentTab === "ir") {
        content = compilerData.ir?.join("\n");
        if (content) {
            panel.innerHTML = `<pre style="margin:0;font-family:inherit;">${escapeHtml(content)}</pre>`;
        } else {
            panel.innerHTML = '<span style="color:#6e7686;">— no data —</span>';
        }
    }
    else if (currentTab === "instructions") {
        content = compilerData.instructions?.join("\n");
        if (content) {
            panel.innerHTML = `<pre style="margin:0;font-family:inherit;">${escapeHtml(content)}</pre>`;
        } else {
            panel.innerHTML = '<span style="color:#6e7686;">— no data —</span>';
        }
    }
}

function updateBenchmarkPanel(benchmarkData) {
    const benchmarkStats = document.getElementById("benchmarkStats");
    if (benchmarkData && benchmarkData.success) {
        benchmarkStats.innerHTML = `
            <div class="stat-card">
                <div class="stat-label">IR INSTRUCTIONS</div>
                <div class="stat-value">${benchmarkData.ir_before} → ${benchmarkData.ir_after}</div>
                <div class="stat-sub">⬇ ${benchmarkData.ir_reduction}% reduction</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">BACKEND INST</div>
                <div class="stat-value">${benchmarkData.inst_before} → ${benchmarkData.inst_after}</div>
                <div class="stat-sub">⬇ ${benchmarkData.inst_reduction}% reduction</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">EXECUTION TIME</div>
                <div class="stat-value">${benchmarkData.time_before_ms}ms → ${benchmarkData.time_after_ms}ms</div>
                <div class="stat-sub">⬇ ${((1 - benchmarkData.time_after_ms/benchmarkData.time_before_ms)*100).toFixed(1)}% faster</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">SPEEDUP</div>
                <div class="stat-value speedup">${benchmarkData.speedup}x</div>
                <div class="stat-sub">optimized vs unoptimized</div>
            </div>
        `;
    } else {
        benchmarkStats.innerHTML = '<span style="color:#6e7681; grid-column: span 2; text-align: center;">— benchmark failed —</span>';
    }
}

async function runCode() {
    const code = editor.getValue();
    const outputDiv = document.getElementById("output");
    const runBtn = document.querySelector(".run-btn");
    
    outputDiv.innerHTML = '<span style="color:#8b949e;">⏳ compiling...</span>';
    runBtn.disabled = true;
    runBtn.style.opacity = "0.6";
    
    try {
        const benchmarkResponse = await fetch("/benchmark", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: code })
        });
        const benchmarkData = await benchmarkResponse.json();
        
        if (benchmarkData.success) {
            updateBenchmarkPanel(benchmarkData);
        }
        
        const compileResponse = await fetch("/compile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: code })
        });
        
        const compileData = await compileResponse.json();
        compilerData = compileData;
        
        if (compileData.success) {
            let outputText = compileData.output || compileData.result || "(no output)";
            outputDiv.innerHTML = `<span class="success">✓ SUCCESS</span>\n\n${escapeHtml(outputText)}`;
            updatePanel();
        } else {
            outputDiv.innerHTML = `<span class="error">✗ ERROR</span>\n\n${escapeHtml(compileData.error || "Unknown error")}`;
        }
    } catch (err) {
        outputDiv.innerHTML = `<span class="error">✗ CONNECTION ERROR</span>\n\nMake sure Flask is running on port 5000.\n\n${err.message}`;
    } finally {
        runBtn.disabled = false;
        runBtn.style.opacity = "1";
    }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

setTimeout(runCode, 300);
</script>
</body>
</html>
